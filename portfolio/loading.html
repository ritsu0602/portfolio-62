<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Story Loader</title>
    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0e1116;
        --primary-gray: #b0b3b8;
        --accent-pink: #ff3b8f;
        --btn-gray: #c0c2c5;
        --load-time: 3s;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-color);
        height: 100vh;
        overflow: hidden;
        font-family: "Space Grotesk", sans-serif;
        color: var(--primary-gray);
      }

      /* メインコンテンツ（幕開け演出） */
      .main-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transform: scale(0.95);
        filter: blur(10px);
        transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 1;
        text-align: center;
      }

      body.loaded .main-content {
        opacity: 1;
        transform: scale(1);
        filter: blur(0px);
      }

      .main-content h1 {
        font-size: 3rem;
        color: white;
        margin-bottom: 10px;
        letter-spacing: 5px;
        text-transform: uppercase;
      }

      /* ローディングスクリーン */
      .loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        transition:
          opacity 0.8s ease,
          transform 1.2s cubic-bezier(0.7, 0, 0.3, 1),
          visibility 0.8s ease;
      }

      body.loaded .loader-wrapper {
        opacity: 0;
        transform: scale(1.4); /* 爆発するように広がる視覚効果 */
        visibility: hidden;
      }

      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 90%;
        max-width: 500px;
      }

      /* 波形エリア */
      .waveform {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        width: 100%;
        height: 60px;
        margin-bottom: 20px;
      }

      .bar {
        width: 3px;
        background-color: var(--primary-gray);
        border-radius: 2px;
        height: 20%;
        animation: wave 1.2s ease-in-out infinite;
      }

      @keyframes wave {
        0%,
        100% {
          height: 20%;
        }
        50% {
          height: 100%;
        }
      }

      /* プログレスバー */
      .progress-container {
        width: 100%;
        height: 2px;
        background-color: #333;
        position: relative;
        margin-bottom: 40px;
      }

      .progress-line {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        background-color: var(--primary-gray);
        width: 0%;
        animation: loadProgress var(--load-time) linear forwards;
      }

      .progress-thumb {
        position: absolute;
        top: 50%;
        left: 0%;
        width: 14px;
        height: 14px;
        background-color: var(--primary-gray);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: moveThumb var(--load-time) linear forwards;
      }

      @keyframes loadProgress {
        to {
          width: 100%;
        }
      }
      @keyframes moveThumb {
        to {
          left: 100%;
        }
      }

      /* コントロールボタン群 */
      .controls {
        display: flex;
        align-items: center;
        gap: 40px;
        margin-bottom: 30px;
      }

      .btn-side {
        display: flex;
        gap: 4px;
        opacity: 0.5;
      }

      .triangle {
        width: 0;
        height: 0;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
      }
      .triangle.left {
        border-right: 14px solid var(--btn-gray);
      }
      .triangle.right {
        border-left: 14px solid var(--btn-gray);
      }

      .play-button {
        width: 80px;
        height: 80px;
        background-color: var(--btn-gray);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        box-shadow: 0 0 0 0 rgba(255, 59, 143, 0);
        animation: pulse 2s infinite;
        transition:
          transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          background-color 0.3s;
      }

      /* 3秒後の「自動クリック」演出 */
      .play-button.clicked {
        transform: scale(0.85);
        background-color: var(--accent-pink);
      }

      .play-triangle {
        width: 0;
        height: 0;
        border-top: 18px solid transparent;
        border-bottom: 18px solid transparent;
        border-left: 26px solid var(--accent-pink);
        margin-left: 6px;
        transition: border-left-color 0.3s;
      }

      .play-button.clicked .play-triangle {
        border-left-color: white;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 59, 143, 0.5);
        }
        70% {
          box-shadow: 0 0 0 20px rgba(255, 59, 143, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(255, 59, 143, 0);
        }
      }

      .loading-text {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 4px;
        color: var(--primary-gray);
        text-transform: uppercase;
      }

      /* モバイル対応 */
      @media (max-width: 767px) {
        .main-content h1 {
          font-size: 2rem;
        }
        .loader-container {
          width: 85%;
        }
        .play-button {
          width: 70px;
          height: 70px;
        }
      }
    </style>
  </head>
  <body>
    <!-- 幕開け後に表示されるコンテンツ -->
    <div class="main-content">
      <h1>Welcome</h1>
      <p>THE STORY BEGINS</p>
    </div>

    <!-- ローディングスクリーン -->
    <div class="loader-wrapper">
      <div class="loader-container">
        <!-- 波形 -->
        <div class="waveform" id="waveform"></div>

        <!-- シークバー -->
        <div class="progress-container">
          <div class="progress-line"></div>
          <div class="progress-thumb"></div>
        </div>

        <!-- コントロール -->
        <div class="controls">
          <div class="btn-side">
            <div class="triangle left"></div>
            <div class="triangle left"></div>
          </div>
          <div class="play-button" id="playBtn">
            <div class="play-triangle"></div>
          </div>
          <div class="btn-side">
            <div class="triangle right"></div>
            <div class="triangle right"></div>
          </div>
        </div>

        <!-- テキスト（固定） -->
        <div class="loading-text">PLAY MY STORY</div>
      </div>
    </div>

    <script>
      const waveform = document.getElementById("waveform");
      const playBtn = document.getElementById("playBtn");
      const barCount = 50;

      // 躍動感のある波形生成
      for (let i = 0; i < barCount; i++) {
        const bar = document.createElement("div");
        bar.classList.add("bar");
        const duration = 0.4 + Math.random() * 0.8;
        const delay = Math.random() * 2;
        bar.style.animationDuration = `${duration}s`;
        bar.style.animationDelay = `-${delay}s`;
        const centerDist = Math.abs(i - barCount / 2);
        const baseHeight = Math.max(15, 75 - centerDist * 2.8);
        bar.style.height = `${baseHeight}%`;
        waveform.appendChild(bar);
      }

      // 3秒間の読み込み演出
      window.addEventListener("load", () => {
        const loadingDuration = 3000;

        setTimeout(() => {
          // 1. 再生ボタンが押し込まれ、色がピンクから白に変わる「再生開始」の視覚的合図
          playBtn.classList.add("clicked");

          setTimeout(() => {
            // 2. 画面が外側に弾けるようにフェードアウトし、メインコンテンツが登場
            document.body.classList.add("loaded");
          }, 500); // クリックの余韻
        }, loadingDuration);
      });
    </script>
  </body>
</html>
